<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unravel RDF — KNApSAcK example</title>

    <link rel="stylesheet" href="console.css" />
  </head>

  <body>
    <pre id="log"></pre>

    <script src="console.js"></script>

    <!-- Unravel RDF library -->
    <!-- <script src="target/cdn-debug/unravel-rdf.min.js"></script> -->
    <script src="https://unravel-rdf-5df20c.pages-forge.inrae.fr/cdn/latest/unravel-rdf.min.js"></script>
    <script>
      const { UnravelConfig, UnravelSession } = window.UnravelRdf

      const config = UnravelConfig
        .init()
        .sparqlEndpoint("https://rdfportal.org/primary/sparql")

      /**
       * Find KNApSAcK Core records and their molecular-entity names.
       *
       * The Lambda Enclosure attached to `something` describes the RDF
       * neighbourhood of each KNApSAcK Core record:
       *
       *   record --dc:identifier--> knapsack_id
       *   record --sio:SIO_000008--> molecular entity
       *   molecular entity --sio:SIO_000300--> entity name
       */
      UnravelSession(config)
        .prefix("dc", "http://purl.org/dc/elements/1.1/")
        .prefix("knapsack", "http://purl.jp/knapsack/resource#")
        .prefix("sio", "http://semanticscience.org/resource/")
        .prefix("cheminf", "http://semanticscience.org/resource/")

        .something(
          "record",
          record => record
            .out("dc:identifier", "knapsackId")
            .out(
              "sio:SIO_000008",
              "molecularEntity",
              molecularEntity => molecularEntity
                .isA("cheminf:CHEMINF_000043")
                .out(
                  "sio:SIO_000300",
                  "molecularEntityName"
                )
            )
        )

        .select(
          "record",
          "knapsackId",
          "molecularEntityName"
        )
        .limit(20)
        .commit()
        .raw()

        .then(response => {
          console.log("KNApSAcK molecular entities")
          console.log(response)
        })

        .catch(error => {
          console.error("Unable to query the RDF Portal endpoint", error)
        })
    </script>
  </body>
</html>
