stages:
  - test
  - build
  - publish
  - pages

# ─────────────────────────────────────────────
# Ancre : installation Java + sbt
# ─────────────────────────────────────────────
.setup_java_sbt: &setup_java_sbt
  - apt-get update -y
  - apt-get install -y curl gnupg ca-certificates openjdk-17-jdk
  - java -version
  - node --version
  - npm --version
  - |
    echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | tee /etc/apt/sources.list.d/sbt.list
    echo "deb https://repo.scala-sbt.org/scalasbt/debian /" | tee /etc/apt/sources.list.d/sbt_old.list
    curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" \
      | gpg --dearmor \
      | tee /etc/apt/trusted.gpg.d/scalasbt-release.gpg >/dev/null
    apt-get update -y
    apt-get install -y sbt
    sbt sbtVersion
  - test -f build.sbt

# ─────────────────────────────────────────────
# Ancre : configuration npm registry GitLab
# ─────────────────────────────────────────────
.setup_npm_registry: &setup_npm_registry
  - |
    echo "@p2m2:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc

# ─────────────────────────────────────────────
# Image et cache communs
# ─────────────────────────────────────────────
default:
  image: node:20-bookworm
  cache:
    key: "${CI_PROJECT_NAME}"
    paths:
      - .ivy2/cache
      - .sbt
      - .cache/coursier
      - node_modules/
      - target/

# ═════════════════════════════════════════════
# STAGE : test
# ═════════════════════════════════════════════
scala_js_tests:
  stage: test
  services:
    - name: tenforce/virtuoso:virtuoso7.2.5
      alias: virtuoso
      variables:
        DBA_PASSWORD: "dba"
        SPARQL_UPDATE: "true"
        DEFAULT_GRAPH: "graph:test:unravel-rdf:default:"
        VIRT_Parameters_NumberOfBuffers: "51000"
        VIRT_Parameters_MaxDirtyBuffers: "37500"
        VIRT_Parameters_TN_MAX_memory: "4000000"
        VIRT_Parameters_TransactionAfterImageLimit: "500000"
        VIRT_SPARQL_ResultSetMaxRows: "1000"
        VIRT_SPARQL_MaxDataSourceSize: "10000"
        VIRT_SPARQL_MaxQueryCostEstimationTime: "0"
        VIRT_SPARQL_MaxQueryExecutionTime: "0"
  variables:
    SBT_OPTS: "-Dsbt.ci=true -Dsbt.color=false"
    COURSIER_CACHE: ".cache/coursier"
    IVY_HOME: ".ivy2"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    VIRTUOSO_URL: "http://virtuoso:8890/sparql"
    VIRTUOSO_ISQL_PORT: "1111"
    VIRTUOSO_HOST: "virtuoso"
    VIRTUOSO_USER: "dba"
    VIRTUOSO_PASSWORD: "dba"
  before_script:
    - *setup_java_sbt
    - |
      echo "Waiting for Virtuoso..."
      for i in $(seq 1 60); do
        if curl -fsS "http://virtuoso:8890/sparql" >/dev/null; then
          echo "Virtuoso is ready"
          break
        fi
        echo "Virtuoso not ready yet ($i/60)"
        sleep 2
      done
    - |
      echo "Starting HTTP server for test resources..."
      cd src/test/resources && python3 -m http.server 8080 &
      sleep 1
      curl -fsS "http://localhost:8080/animals_basic.ttl" >/dev/null \
        && echo "HTTP server ready on port 8080" \
        || echo "WARNING: HTTP server not responding"
      cd $CI_PROJECT_DIR
  script:
    - sbt clean test
  artifacts:
    when: always
    paths:
      - target/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

html_js_tests:
  stage: test
  variables:
    SBT_OPTS: "-Dsbt.ci=true -Dsbt.color=false"
    COURSIER_CACHE: ".cache/coursier"
    IVY_HOME: ".ivy2"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  before_script:
    - *setup_java_sbt
    - apt-get update -y
    - apt-get install -y python3
  script:
    - sbt fastOptJS npmPrepareDebugRelease
    - cd html_test
    - npm ci
    - npm install -D @playwright/test
    - npx playwright install chromium --with-deps
    - cd $CI_PROJECT_DIR
    - python3 -m http.server 8080 >/tmp/html-test-server.log 2>&1 &
    - |
      for i in $(seq 1 30); do
        if curl -fsS "http://127.0.0.1:8080/html_test/run.html" >/dev/null; then
          echo "HTML test server ready"
          break
        fi
        echo "Waiting for HTML test server ($i/30)"
        sleep 1
      done
    - cd html_test
    - npx playwright test
  artifacts:
    when: always
    paths:
      - html_test/test-results/
      - html_test/playwright-report/
      - /tmp/html-test-server.log
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# ═════════════════════════════════════════════
# STAGE : build
# ═════════════════════════════════════════════

# Build optimisé (release) : fullOptJS + cdnPrepare (webpack UMD browser-ready)
build_release:
  stage: build
  needs: ["scala_js_tests"]
  variables:
    SBT_OPTS: "-Dsbt.ci=true -Dsbt.color=false"
    COURSIER_CACHE: ".cache/coursier"
    IVY_HOME: ".ivy2"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    DISCOVERY_VERSION: "$CI_COMMIT_TAG"
  before_script:
    - *setup_java_sbt
  script:
    # fullOptJS : compile Scala.js en CommonJS optimisé
    # cdnPrepare : npm install dans target/npm/ + webpack UMD → target/cdn/unravel-rdf.min.js
    - sbt fullOptJS cdnPrepare npmPrepareRelease
    - |
      echo "npm bundle size : $(du -sh target/npm/unravel-rdf.js | cut -f1)"
      echo "CDN bundle size : $(du -sh target/cdn/unravel-rdf.min.js | cut -f1)"
  artifacts:
    when: always
    paths:
      - target/npm/
      - target/cdn/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG !~ /-debug$/'

# Build debug : fastOptJS + source maps
build_debug:
  stage: build
  needs: ["scala_js_tests"]
  variables:
    SBT_OPTS: "-Dsbt.ci=true -Dsbt.color=false"
    COURSIER_CACHE: ".cache/coursier"
    IVY_HOME: ".ivy2"
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    DISCOVERY_VERSION: "$CI_COMMIT_TAG"
  before_script:
    - *setup_java_sbt
  script:
    - sbt fastOptJS npmPrepareDebugRelease
  artifacts:
    when: always
    paths:
      - target/npm-debug/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /-debug$/'

# ═════════════════════════════════════════════
# STAGE : publish (npm registry GitLab)
# ═════════════════════════════════════════════

publish_npm_release:
  stage: publish
  needs: ["build_release"]
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - cd target/npm
    - *setup_npm_registry
    - npm publish --tag latest
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG !~ /-debug$/'

publish_npm_debug:
  stage: publish
  needs: ["build_debug"]
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
  script:
    - cd target/npm-debug
    - *setup_npm_registry
    - npm publish --tag debug
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /-debug$/'

# ═════════════════════════════════════════════
# STAGE : pages (CDN + documentation Jekyll)
# ═════════════════════════════════════════════

# Job pages — déclenché sur tag release (doc Jekyll + CDN)
pages:
  stage: pages
  needs: ["build_release"]
  variables:
    DISCOVERY_VERSION: "$CI_COMMIT_TAG"
  before_script:
    - apt-get update -y && apt-get install -y ruby-full build-essential
    - gem install bundler
    - cd docs && bundle install && cd ..
  script:
    # ── 1. Documentation Jekyll ──────────────────────────────────────────
    - |
      cd docs
      bundle exec jekyll build --destination ../public
      cd ..

    # ── 2. CDN : version épinglée (bundle UMD browser-ready) ─────────────
    - mkdir -p public/cdn/${CI_COMMIT_TAG}
    - cp target/cdn/unravel-rdf.min.js public/cdn/${CI_COMMIT_TAG}/unravel-rdf.min.js

    # ── 3. CDN : alias "latest" ──────────────────────────────────────────
    - mkdir -p public/cdn/latest
    - cp target/cdn/unravel-rdf.min.js public/cdn/latest/unravel-rdf.min.js

    # ── 4. CDN : index des versions disponibles (JSON) ───────────────────
    - |
      VERSIONS=$(ls public/cdn/ | grep -v latest | grep -v versions.json | sort -V | sed 's/.*/\"&\"/' | tr '\n' ',' | sed 's/,$//')
      echo "{\"latest\":\"${CI_COMMIT_TAG}\",\"versions\":[${VERSIONS}]}" \
        > public/cdn/versions.json

    # ── 5. Résumé des URLs publiées ──────────────────────────────────────
    - |
      echo "================================================"
      echo "Documentation : https://${CI_PAGES_DOMAIN}/"
      echo "CDN latest    : https://${CI_PAGES_DOMAIN}/cdn/latest/unravel-rdf.min.js"
      echo "CDN version   : https://${CI_PAGES_DOMAIN}/cdn/${CI_COMMIT_TAG}/unravel-rdf.min.js"
      echo "Index versions: https://${CI_PAGES_DOMAIN}/cdn/versions.json"
      echo "================================================"
  artifacts:
    paths:
      - public
    # Pas d'expire_in sur pages : GitLab Pages gère sa propre rétention
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG !~ /-debug$/'
